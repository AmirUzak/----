services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_CURRENCY_SYMBOL=${NEXT_PUBLIC_CURRENCY_SYMBOL:-₸}
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://volt:${DB_PASSWORD:-volt}@db:5432/volt
    depends_on:
      - db
    networks:
      - volt-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: volt
      POSTGRES_PASSWORD: ${DB_PASSWORD:-volt}
      POSTGRES_DB: volt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volt"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - volt-network

volumes:
  pgdata:

networks:
  volt-network:
    driver: bridge